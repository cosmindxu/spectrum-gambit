name = "spectrum-gambit-api"
account_id = "aafe6928d4c75f9476426e35530c819e"
main = "worker.js"
compatibility_date = "2024-09-01"

# NOTE: the D1 database keeps its original name "spectral-gambit" (renaming a D1
# database would orphan the live leaderboard data); the binding is by database_id.
[[d1_databases]]
binding = "DB"
database_name = "spectral-gambit"
database_id = "45d43325-af38-477c-a886-d5a538e59649"

# Apply the schema:  wrangler d1 execute spectral-gambit --file=schema.sql --remote
# Deploy:            wrangler deploy
